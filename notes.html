<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 3 - Notes App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #fff7f3, #f5f5f5);
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            color: #2f2f2f;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #d14715, #ff6a2a);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .notes-list {
            margin-top: 25px;
            display: grid;
            gap: 15px;
        }

        .note {
            background: #fff4ef;
            padding: 18px;
            border-radius: 14px;
            text-align: left;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .note p {
            margin: 0 0 12px 0;
            color: #444;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .note button {
            margin-top: 0;
            background: #999;
            font-size: 14px;
            padding: 8px 14px;
        }

        .note button:hover {
            background: #777;
        }
        .note-buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.note-buttons button {
    margin-top: 0;
}

        @media (max-width: 600px) {
    body {
        padding: 20px 14px;
    }

    .container {
        padding: 22px;
    }

    h1 {
        font-size: 26px;
    }

    textarea {
        font-size: 16px;
    }

    button {
        width: 100%;
    }

    .note-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .note-buttons button {
        width: auto;
        margin-top: 0;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <h1>My Notes App 📝</h1>
        <p>Save your thoughts, plans, and ideas in one place.</p>

        <textarea id="noteInput" placeholder="Write your note here..."></textarea>
        <button onclick="addNote()">Save Note</button>

        <div id="notesList" class="notes-list"></div>
    </div>

    <script>
        function addNote() {
            let noteInput = document.getElementById("noteInput");
            let noteText = noteInput.value.trim();

            if (noteText === "") return;

            createNoteElement(noteText);
            saveNote(noteText);

            noteInput.value = "";
            noteInput.focus();
        }

        function createNoteElement(noteText) {
    let noteDiv = document.createElement("div");
    noteDiv.classList.add("note");

    let noteParagraph = document.createElement("p");
    noteParagraph.textContent = noteText;

    let buttonContainer = document.createElement("div");
    buttonContainer.classList.add("note-buttons");

    let editButton = document.createElement("button");
    editButton.textContent = "Edit";
    editButton.onclick = function () {
    let noteInput = document.getElementById("noteInput");
    noteInput.value = noteText;
    noteDiv.remove();
    updateStorage();
    noteInput.focus();
    noteInput.setSelectionRange(noteInput.value.length, noteInput.value.length);
};

    let deleteButton = document.createElement("button");
    deleteButton.textContent = "Delete";
    deleteButton.onclick = function () {
        noteDiv.remove();
        updateStorage();
    };

    buttonContainer.appendChild(editButton);
    buttonContainer.appendChild(deleteButton);

    noteDiv.appendChild(noteParagraph);
    noteDiv.appendChild(buttonContainer);

    document.getElementById("notesList").appendChild(noteDiv);
}

        function saveNote(noteText) {
            let notes = JSON.parse(localStorage.getItem("notes")) || [];
            notes.push(noteText);
            localStorage.setItem("notes", JSON.stringify(notes));
        }

        function updateStorage() {
            let notes = [];

            document.querySelectorAll(".note p").forEach(note => {
                notes.push(note.textContent);
            });

            localStorage.setItem("notes", JSON.stringify(notes));
        }

        window.onload = function () {
            let notes = JSON.parse(localStorage.getItem("notes")) || [];

            notes.forEach(note => {
                createNoteElement(note);
            });
        };
        document.getElementById("noteInput").addEventListener("keydown", function(event) {
    if (event.ctrlKey && event.key === "Enter") {
        event.preventDefault();
        addNote();
    }
});
    </script>
</body>
</html>
